<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Встрой-Мебель.ру — Демо</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
    .demo-page { max-width: 800px; margin: 60px auto; padding: 20px; text-align: center; }
    .demo-page h1 { color: #333; margin-bottom: 10px; }
    .demo-page p { color: #666; }
  </style>
</head>
<body>
  <div class="demo-page">
    <h1>Встрой-Мебель.ру</h1>
    <p>Демо-страница сайта. Чат-виджет АлИИна в правом нижнем углу.</p>
  </div>

  <!-- Chat Widget -->
  <div id="aliina-widget"></div>
  <style>
    #aliina-toggle {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      width: 60px; height: 60px; border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none; cursor: pointer; color: #fff; font-size: 28px;
      box-shadow: 0 4px 20px rgba(102,126,234,0.4);
      transition: transform 0.2s;
    }
    #aliina-toggle:hover { transform: scale(1.1); }

    #aliina-chat {
      position: fixed; bottom: 100px; right: 24px; z-index: 9998;
      width: 380px; max-height: 520px; border-radius: 16px;
      background: #fff; box-shadow: 0 8px 40px rgba(0,0,0,0.15);
      display: none; flex-direction: column; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #aliina-chat.open { display: flex; }

    .chat-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff; padding: 16px 20px; font-size: 16px; font-weight: 600;
      display: flex; justify-content: space-between; align-items: center;
    }
    .chat-header .status { font-size: 12px; font-weight: 400; opacity: 0.8; }
    .chat-close { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; }

    .chat-messages {
      flex: 1; overflow-y: auto; padding: 16px; min-height: 300px;
      display: flex; flex-direction: column; gap: 10px;
    }

    .msg { max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
    .msg.user { align-self: flex-end; background: #667eea; color: #fff; border-bottom-right-radius: 4px; }
    .msg.assistant { align-self: flex-start; background: #f0f0f0; color: #333; border-bottom-left-radius: 4px; }
    .msg.typing { font-style: italic; color: #999; background: #f8f8f8; }

    .chat-input {
      padding: 12px 16px; border-top: 1px solid #eee;
      display: flex; gap: 8px; align-items: center;
    }
    .chat-input input {
      flex: 1; border: 1px solid #ddd; border-radius: 20px;
      padding: 10px 16px; font-size: 14px; outline: none;
    }
    .chat-input input:focus { border-color: #667eea; }
    .chat-input button {
      width: 38px; height: 38px; border-radius: 50%; border: none;
      background: #667eea; color: #fff; font-size: 16px; cursor: pointer;
    }
    .chat-input button:disabled { opacity: 0.5; cursor: default; }
    .btn-mic { background: #e0e0e0 !important; color: #333 !important; font-size: 18px !important; }
    .btn-mic.recording { background: #e74c3c !important; color: #fff !important; }

    .btn-speak {
      background: none; border: none; cursor: pointer; font-size: 14px;
      color: #667eea; margin-left: 4px;
    }
    .btn-speak.playing { color: #e74c3c; }
    .btn-attach {
      background: #f0f0f0 !important; color: #333 !important; font-size: 16px !important;
    }
    #file-input { display: none; }

    @media (max-width: 480px) {
      #aliina-chat { width: calc(100% - 16px); right: 8px; bottom: 90px; max-height: 70vh; }
    }
  </style>

  <button id="aliina-toggle" title="Чат с АлИИной">💬</button>
  <div id="aliina-chat">
    <div class="chat-header">
      <div>
        АлИИна
        <div class="status">онлайн</div>
      </div>
      <button class="chat-close" id="chat-close">&times;</button>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input">
      <button class="btn-attach" id="btn-attach" title="Прикрепить фото/файл">📎</button>
      <input type="file" id="file-input" accept="image/*,.pdf">
      <button class="btn-mic" id="btn-mic" title="Голосовой ввод">🎤</button>
      <input type="text" id="chat-input" placeholder="Напишите сообщение..." autocomplete="off">
      <button id="btn-send" title="Отправить">➤</button>
    </div>
  </div>

  <script>
    const sessionId = 'session_' + Math.random().toString(36).slice(2, 10);
    const toggle = document.getElementById('aliina-toggle');
    const chatBox = document.getElementById('aliina-chat');
    const closeBtn = document.getElementById('chat-close');
    const messagesEl = document.getElementById('chat-messages');
    const inputEl = document.getElementById('chat-input');
    const sendBtn = document.getElementById('btn-send');
    const micBtn = document.getElementById('btn-mic');
    const attachBtn = document.getElementById('btn-attach');
    const fileInput = document.getElementById('file-input');
    let sending = false;
    let currentAudio = null;

    // Утилита: очистка служебных тегов
    function cleanTags(text) {
      return text.replace(/<!--DATA:.*?-->/gs, '').replace(/<!--STATE:.*?-->/gs, '').replace(/<!--(DATA|STATE):.*$/s, '').trim();
    }

    toggle.addEventListener('click', () => {
      chatBox.classList.toggle('open');
      if (chatBox.classList.contains('open') && messagesEl.children.length === 0) {
        sendMessage('Привет');
      }
    });
    closeBtn.addEventListener('click', () => chatBox.classList.remove('open'));

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !sending) sendFromInput();
    });
    sendBtn.addEventListener('click', () => { if (!sending) sendFromInput(); });

    function sendFromInput() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = '';
      sendMessage(text);
    }

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    // --- TTS: серверный с фолбеком на браузерный ---
    async function speakText(text, btn) {
      // Если уже играет — остановить
      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
        document.querySelectorAll('.btn-speak.playing').forEach(b => b.classList.remove('playing'));
        return;
      }

      btn.classList.add('playing');

      try {
        // Пробуем серверный TTS
        const res = await fetch('/api/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });

        if (!res.ok) throw new Error('Server TTS unavailable');

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        currentAudio = audio;

        audio.addEventListener('ended', () => {
          btn.classList.remove('playing');
          currentAudio = null;
          URL.revokeObjectURL(url);
        });
        audio.addEventListener('error', () => {
          btn.classList.remove('playing');
          currentAudio = null;
        });
        audio.play();
      } catch {
        // Фолбек на браузерный TTS
        if ('speechSynthesis' in window) {
          const u = new SpeechSynthesisUtterance(text);
          u.lang = 'ru-RU';
          u.addEventListener('end', () => btn.classList.remove('playing'));
          speechSynthesis.speak(u);
        } else {
          btn.classList.remove('playing');
        }
      }
    }

    // --- Основная отправка сообщения ---
    async function sendMessage(text) {
      sending = true;
      sendBtn.disabled = true;
      addMessage(text, 'user');

      const msgEl = addMessage('', 'assistant');
      let fullText = '';

      try {
        const res = await fetch('/api/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, message: text })
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6).trim();
            if (payload === '[DONE]') continue;

            try {
              const chunk = JSON.parse(payload);
              if (chunk.text) {
                fullText += chunk.text;
                msgEl.textContent = cleanTags(fullText);
                messagesEl.scrollTop = messagesEl.scrollHeight;
              }
            } catch {}
          }
        }

        fullText = cleanTags(fullText);
        msgEl.textContent = fullText;

        // Кнопка TTS
        if (fullText) {
          const speakBtn = document.createElement('button');
          speakBtn.className = 'btn-speak';
          speakBtn.textContent = '🔊';
          speakBtn.title = 'Прослушать';
          const textForTTS = fullText;
          speakBtn.addEventListener('click', () => speakText(textForTTS, speakBtn));
          msgEl.appendChild(speakBtn);
        }
      } catch (err) {
        if (!fullText) {
          msgEl.textContent = 'Ошибка соединения. Попробуйте позже.';
        }
      }

      sending = false;
      sendBtn.disabled = false;
    }

    // --- STT: серверный (MediaRecorder → Whisper) с фолбеком на браузерный ---
    let mediaRecorder = null;
    let audioChunks = [];
    let recording = false;

    // Проверяем доступность серверного STT
    let useServerSTT = true;

    micBtn.addEventListener('click', async () => {
      if (recording) {
        stopRecording();
        return;
      }

      recording = true;
      micBtn.classList.add('recording');

      if (useServerSTT) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          audioChunks = [];
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });

          mediaRecorder.addEventListener('dataavailable', (e) => {
            if (e.data.size > 0) audioChunks.push(e.data);
          });

          mediaRecorder.addEventListener('stop', async () => {
            stream.getTracks().forEach(t => t.stop());
            const blob = new Blob(audioChunks, { type: 'audio/webm' });

            micBtn.textContent = '...';
            try {
              const formData = new FormData();
              formData.append('audio', blob, 'recording.webm');
              const res = await fetch('/api/stt', { method: 'POST', body: formData });

              if (!res.ok) throw new Error('STT error');
              const data = await res.json();
              if (data.text) {
                inputEl.value = data.text;
                sendFromInput();
              }
            } catch {
              // Если серверный STT не работает — переключаемся на браузерный
              useServerSTT = false;
            }
            micBtn.textContent = '🎤';
            recording = false;
            micBtn.classList.remove('recording');
          });

          mediaRecorder.start();
        } catch {
          recording = false;
          micBtn.classList.remove('recording');
          useServerSTT = false;
        }
      }

      // Фолбек: браузерный Web Speech API
      if (!useServerSTT) {
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
          const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
          const recognition = new SpeechRecognition();
          recognition.lang = 'ru-RU';
          recognition.continuous = false;
          recognition.interimResults = false;

          recognition.addEventListener('result', (e) => {
            inputEl.value = e.results[0][0].transcript;
          });
          recognition.addEventListener('end', () => {
            recording = false;
            micBtn.classList.remove('recording');
            if (inputEl.value.trim()) sendFromInput();
          });
          recognition.addEventListener('error', () => {
            recording = false;
            micBtn.classList.remove('recording');
          });
          recognition.start();
        } else {
          recording = false;
          micBtn.classList.remove('recording');
        }
      }
    });

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }
      recording = false;
      micBtn.classList.remove('recording');
    }

    // --- Загрузка файлов ---
    attachBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', async () => {
      const file = fileInput.files[0];
      if (!file) return;
      fileInput.value = '';

      addMessage(`📎 ${file.name}`, 'user');

      try {
        const formData = new FormData();
        formData.append('file', file);
        const res = await fetch('/api/upload', { method: 'POST', body: formData });

        if (!res.ok) {
          const err = await res.json();
          addMessage(`Ошибка загрузки: ${err.error}`, 'assistant');
          return;
        }

        const data = await res.json();
        // Отправляем сообщение в чат о том, что клиент прислал файл
        sendMessage(`[Клиент прислал файл проекта: ${file.name}]`);
      } catch {
        addMessage('Ошибка загрузки файла.', 'assistant');
      }
    });
  </script>
</body>
</html>
